services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_PROXY_TARGET=http://backend:80
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules # Bảo toàn node_modules sinh ra trong container
    ports:
      - "5173:5173"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: sh -c "composer install --prefer-dist --no-interaction && (grep -q 'APP_KEY=base64' .env || php artisan key:generate) && php artisan migrate --force && chmod -R 777 storage bootstrap/cache && apache2-foreground"
    environment:
      - APP_URL=http://localhost:8000
      - ASSET_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:5173
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=notes_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    ports:
      - "8000:80"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: notes_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      # Mount folder dữ liệu cố định tránh mất sau mỗi lần khởi động
      - ./docker/mysql_data:/var/lib/mysql

volumes:
  backend_vendor:


spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:notes_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      # NEVER use create/update — existing schema must not be touched
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    # Baseline mode: mark existing DB as already at version 0
    # so Flyway does not try to run any migration scripts on existing data
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

app:
  resend:
    api-key: ${RESEND_API_KEY:}
    from-address: ${MAIL_FROM_ADDRESS:onboarding@resend.dev}
  backend-url: http://localhost:8080
  jwt:
    secret: dev-secret-key-change-in-production-must-be-at-least-256-bits-long-xxxxx
    expiration-ms: 86400000  # 24 hours
  frontend-url: http://localhost:5173
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:note-attachments}
  pusher:
    app-id: ${PUSHER_APP_ID:}
    key: ${PUSHER_APP_KEY:}
    secret: ${PUSHER_APP_SECRET:}
    cluster: ${PUSHER_APP_CLUSTER:ap1}

logging:
  level:
    com.jotdown: DEBUG
    org.springframework.security: DEBUG

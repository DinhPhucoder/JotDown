name: Keep Render Alive

on:
  schedule:
    # Chạy mỗi 10 phút (Cron syntax)
    - cron: '*/10 * * * *'
  # Cho phép chạy bằng tay trên giao diện GitHub
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Gọi API Ping
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ]; then
            echo "Vui lòng thêm RENDER_URL vào GitHub Secrets!"
            exit 1
          fi
          curl -sS "${{ secrets.RENDER_URL }}/api/ping"
